services:
  # 1. Jobify Backend (Node.js)
  - type: web
    name: jobify-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Render will ask for this value manually
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: JWT_COOKIE_EXPIRE
        value: "30"
      - key: PYTHON_AI_SERVICE_URL
        # Render's internal host is just the name. 
        value: http://jobify-ai:8000/api/v1/ai

  # 2. Jobify AI Service (Python)
  - type: web
    name: jobify-ai
    env: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000

  # 3. Jobify Client (Static Site)
  - type: web
    name: jobify-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
