version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  ai-service:
    build: ./ai-service
    container_name: ai_service_container
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/smart-recruitment
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build: ./backend
    container_name: backend_container
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/smart-recruitment
      - FRONTEND_URL=/
      - PYTHON_AI_SERVICE_URL=http://ai-service:8000/api/v1/ai
    depends_on:
      - mongodb
      - ai-service
    restart: always

  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: client_container
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - backend
    restart: always

volumes:
  mongodb_data:
